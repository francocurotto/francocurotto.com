<h2>🍌 Banana Milk in Thermomix</h2>
<h3>📋 Ingredients</h3>
<ul>
<li>🍌 2 bananas</li>
<li>🥛 500ml milk</li>
<li>🥄 2 tsp sugar</li>
</ul>
<h3>🔢 Instructions</h3>
<ol>
<li>Add ingredients and crush at <code>30s//s7</code></li>
</ol>
<h3>💡 Ideas</h3>
<ul>
<li>🧊 add ice cubes for freshness</li>
<li>add cinnamon for more flavor</li>
</ul>
